name: Backend and Frontend Docker Images

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend-docker.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend-docker.yml"
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: yrfashion-backend
  FRONTEND_IMAGE_NAME: yrfashion-frontend

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend build
        run: npm run build

  build-backend-image:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: backend-checks

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image namespace
        id: image-vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Prepare image targets
        id: targets
        shell: bash
        run: |
          ghcr_image="${{ env.GHCR_REGISTRY }}/${{ steps.image-vars.outputs.owner }}/${{ env.BACKEND_IMAGE_NAME }}"
          dockerhub_enabled=false

          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            dockerhub_enabled=true
          fi

          {
            echo "images<<EOF"
            echo "$ghcr_image"

            if [ "${dockerhub_enabled}" = "true" ]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/${{ env.BACKEND_IMAGE_NAME }}"
            fi

            echo "EOF"
            echo "dockerhub_enabled=${dockerhub_enabled}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch && steps.targets.outputs.dockerhub_enabled == 'true' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.targets.outputs.images }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend-image:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: frontend-checks

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image namespace
        id: image-vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Prepare image targets
        id: targets
        shell: bash
        run: |
          ghcr_image="${{ env.GHCR_REGISTRY }}/${{ steps.image-vars.outputs.owner }}/${{ env.FRONTEND_IMAGE_NAME }}"
          dockerhub_enabled=false

          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            dockerhub_enabled=true
          fi

          {
            echo "images<<EOF"
            echo "$ghcr_image"

            if [ "${dockerhub_enabled}" = "true" ]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/${{ env.FRONTEND_IMAGE_NAME }}"
            fi

            echo "EOF"
            echo "dockerhub_enabled=${dockerhub_enabled}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch && steps.targets.outputs.dockerhub_enabled == 'true' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.targets.outputs.images }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
